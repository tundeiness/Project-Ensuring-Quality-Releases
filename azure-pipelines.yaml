name: Azure Pipelines

trigger:
  branches:
    include:
      - main

pool:
  name: myAgentPool

variables:
  - group: azure-credentials
  - group: azure-storage-key
  - group: vm-ssh-key
  - name: python_version
    value: '3.8.10'
  - name: azureServiceConnectionId
    value: 'ServiceConnex'
  - name: projectRoot
    value: '$(System.DefaultWorkingDirectory)'
  - name: environmentName
    value: 'test'
  - name: vmImageName
    value: 'devopsVM'
  - name: vmPublicIp
    value: '4.246.204.235'  # Replace with actual IP or output it from Terraform
  - name: sshUsername
    value: 'azureuser'
  - name: sshPrivateKey
    value: 'id_rsa'  # Secure variable

stages:
  - stage: Build
    displayName: 'Provision Infrastructure'
    jobs:
      - job: BuildInfrastructure
        displayName: 'Infrastructure Provisioning'
        steps:
          - task: Bash@3
            displayName: 'Configure Selenium on Build Agent'
            inputs:
              targetType: 'inline'
              script: |
                sudo apt-get update
                sudo apt-get upgrade -y
                sudo apt-get install -y python3-pip unzip expect chromium-browser
                pip3 install selenium
                sudo rm -rf chromedriver*
                wget https://chromedriver.storage.googleapis.com/96.0.4664.18/chromedriver_linux64.zip
                unzip chromedriver_linux64.zip
                sudo mv chromedriver /usr/bin/chromedriver
                sudo chmod +x /usr/bin/chromedriver

  - stage: Test
    displayName: 'Selenium Testing Stage'
    jobs:
      - job: DeploySeleniumOnVM
        displayName: 'Run Selenium Test on Remote VM'
        steps:
          - task: Bash@3
            displayName: 'Create SSH Key File'
            inputs:
              targetType: 'inline'
              script: |
                echo "Writing SSH private key to file..."
                echo "$sshPrivateKey" > key.pem
                chmod 600 key.pem

          - task: Bash@3
            displayName: 'Transfer Selenium Test Files to VM'
            inputs:
              targetType: 'inline'
              script: |
                echo "Copying test files to remote VM..."
                scp -i key.pem -o StrictHostKeyChecking=no -r automatedtesting/selenium ${sshUsername}@${vmPublicIp}:/home/${sshUsername}/automatedtesting/

          - task: Bash@3
            displayName: 'Run Selenium Test via SSH'
            inputs:
              targetType: 'inline'
              script: |
                echo "Running test on remote VM..."
                ssh -i key.pem -o StrictHostKeyChecking=no ${sshUsername}@${vmPublicIp} << 'EOF'
                  cd /home/${sshUsername}/automatedtesting/selenium
                  python3 login.py
                EOF
