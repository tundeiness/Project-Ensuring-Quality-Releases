    - task: Bash@3
      displayName: 'Configure Selenium'
      inputs:
        targetType: 'inline'
        script: |
          sudo apt-get update
          sudo apt-get upgrade -y
          sudo apt-get install python3-pip unzip expect -y
          sudo apt-get install -y chromium-browser
          pip3 install selenium
          sudo rm -rf chromedriver*
          wget https://chromedriver.storage.googleapis.com/96.0.4664.18/chromedriver_linux64.zip
          unzip chromedriver_linux64.zip
          sudo mv chromedriver -f /usr/bin

- stage: Test
  jobs:
  - job: PostmanTests
    displayName: 'Postman Tests'
    steps:
    - task: Bash@3
      displayName: 'Install Newman'
      inputs:
        targetType: 'inline'
        script: |
          npm install -g newman

    - task: Bash@3
      displayName: 'Run Postman Tests and Export JUnit Results'  
      inputs:
        targetType: 'inline'
        script: |
          newman run automatedtesting/postman/StarterAPIs.json \
            --reporters cli,junit \
            --reporter-junit-export automatedtesting/postman/results/test-results.xml
          

    - task: PublishTestResults@2
      displayName: 'Publish Test Results'
      inputs:
        testResultsFormat: 'JUnit'
        testResultsFiles: 'Results/junitReport.xml'
        mergeTestResults: true

  - job: SeleniumTests
    displayName: 'Selenium Tests'
    steps:
    - task: Bash@3
      displayName: 'Run Selenium'
      inputs:
        targetType: 'inline'
        script: |
          python -m pip install --upgrade pip
          pip install selenium pytest pytest-html chromedriver-py==96.0.4664.18 pytest-xdist pytest-nunit
          python3 automatedtesting/selenium/login.py

  - job: JMeterTests
    displayName: 'JMeter Tests'
    steps:
    - task: Bash@3
      displayName: 'Install JMeter'
      inputs:
        targetType: 'inline'
        script: |
          sudo apt-get install openjdk-11-jre-headless -y
          wget https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-5.4.1.tgz -O jmeter.tgz
          tar -xzvf jmeter.tgz

    - task: Bash@3
      displayName: 'Run JMeter'
      inputs:
        targetType: 'inline'
        script: |
          apache-jmeter-5.4.1/bin/jmeter -n -t automatedtesting/jmeter/Starter.jmx \
            -l automatedtesting/jmeter/logs/test-output.csv \
            -e -f -o automatedtesting/jmeter/logs/test-log.html \
            -j automatedtesting/jmeter/logs/jmeter.log
