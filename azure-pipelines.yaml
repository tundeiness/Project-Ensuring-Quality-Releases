name: Azure Pipelines

trigger:
  branches:
    include:
      - main

pool:
  name: myAgentPool  # Self-hosted agent pool running on devopsVM

variables:
  - group: azure-credentials   
  - group: azure-storage-key
  - group: vm-ssh-key          
  - name: python_version
    value: '3.8.10'
  - name: azureServiceConnectionId
    value: 'ServiceConnex'
  - name: projectRoot
    value: '$(System.DefaultWorkingDirectory)'
  - name: environmentName
    value: 'test'
  - name: vmImageName
    value: 'devopsVM'

stages:
  - stage: PerformanceTest
    displayName: 'Run JMeter Tests'
    jobs:
      - job: JMeter
        displayName: 'Execute JMeter Test Plans on devopsVM'
        pool:
          name: myAgentPool  # Assumes this agent runs on devopsVM
        steps:
          - task: JMeterInstaller@0
            displayName: 'Install JMeter 5.3'
            inputs:
              jmeterVersion: '5.3'

          - task: Bash@3
            displayName: 'Run Endurance and Stress JMeter Tests'
            inputs:
              targetType: 'inline'
              script: |
                echo "Creating result directories..."
                mkdir -p automatedtesting/jmeter/Results/endurance
                mkdir -p automatedtesting/jmeter/Results/stress

                echo "Running endurance.jmx..."
                jmeter -n -t automatedtesting/jmeter/endurance.jmx \
                       -l automatedtesting/jmeter/Results/endurance/results.jtl \
                       -e -o automatedtesting/jmeter/Results/endurance/dashboard

                echo "Running stress.jmx..."
                jmeter -n -t automatedtesting/jmeter/stress.jmx \
                       -l automatedtesting/jmeter/Results/stress/results.jtl \
                       -e -o automatedtesting/jmeter/Results/stress/dashboard

                echo "Zipping all JMeter results..."
                cd automatedtesting/jmeter
                zip -r ../../JMeter_Combined_Results.zip Results
                cd -

          - task: PublishBuildArtifacts@1
            displayName: 'Publish JMeter Test Results'
            inputs:
              PathtoPublish: 'JMeter_Combined_Results.zip'
              ArtifactName: 'JMeterResults'
              publishLocation: 'Container'
